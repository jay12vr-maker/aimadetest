<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        select, input[type="number"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            background: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .image-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .image-item:hover {
            transform: scale(1.05);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .gallery-title {
            font-size: 1.5em;
            color: #333;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 1.1em;
        }

        .api-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .input-section {
                flex-direction: column;
            }

            .settings {
                grid-template-columns: 1fr;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI Image Generator</h1>
        <p class="subtitle">Create stunning images with AI</p>

        <div class="api-note">
            ⚠️ <strong>Setup Required:</strong> This app needs an AI API key. See the README for setup instructions.
        </div>

        <div class="settings">
            <div class="setting-group">
                <label for="apiProvider">AI Provider:</label>
                <select id="apiProvider">
                    <option value="openai">OpenAI DALL-E</option>
                    <option value="huggingface">Hugging Face</option>
                    <option value="stability">Stability AI</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="imageSize">Image Size:</label>
                <select id="imageSize">
                    <option value="256">256x256</option>
                    <option value="512" selected>512x512</option>
                    <option value="1024">1024x1024</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="quantity">Number of Images:</label>
                <select id="quantity">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="promptInput" 
                placeholder="Enter your image description... (e.g., 'A magical forest with glowing mushrooms')"
            >
            <button id="generateBtn">Generate</button>
        </div>

        <div id="statusMessage"></div>
        <div id="loadingSpinner" class="loading-spinner" style="display: none;"></div>

        <div id="galleryContainer"></div>
    </div>

    <script>
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const galleryContainer = document.getElementById('galleryContainer');
        const apiProvider = document.getElementById('apiProvider');
        const imageSize = document.getElementById('imageSize');
        const quantity = document.getElementById('quantity');

        let generatedImages = [];

        generateBtn.addEventListener('click', generateImage);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateImage();
        });

        async function generateImage() {
            const prompt = promptInput.value.trim();

            if (!prompt) {
                showStatus('Please enter a prompt', 'error');
                return;
            }

            generateBtn.disabled = true;
            loadingSpinner.style.display = 'block';
            statusMessage.innerHTML = '';

            try {
                const images = await callAIAPI(prompt);
                generatedImages = [...generatedImages, ...images];
                displayGallery();
                showStatus(`Successfully generated ${images.length} image(s)!`, 'success');
                promptInput.value = '';
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                generateBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            }
        }

        async function callAIAPI(prompt) {
            const provider = apiProvider.value;
            const size = imageSize.value;
            const num = quantity.value;

            // Get API key from backend or environment
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    prompt,
                    provider,
                    size,
                    quantity: num
                })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}`);
            }

            const data = await response.json();
            return data.images || [];
        }

        function displayGallery() {
            if (generatedImages.length === 0) {
                galleryContainer.innerHTML = '<div class="empty-state">No images generated yet. Create one to get started!</div>';
                return;
            }

            let html = '<h2 class="gallery-title">Your Generated Images</h2><div class="gallery">';
            generatedImages.forEach((img, index) => {
                html += `
                    <div class="image-item" onclick="downloadImage('${img}', ${index})">
                        <img src="${img}" alt="Generated image ${index + 1}">
                    </div>
                `;
            });
            html += '</div>';
            galleryContainer.innerHTML = html;
        }

        function downloadImage(src, index) {
            const link = document.createElement('a');
            link.href = src;
            link.download = `ai-image-${Date.now()}-${index}.png`;
            link.click();
        }

        function showStatus(message, type) {
            statusMessage.innerHTML = `<div class="status ${type}">${message}</div>`;
            setTimeout(() => {
                statusMessage.innerHTML = '';
            }, 5000);
        }

        // Initialize gallery display
        displayGallery();
    </script>
</body>
</html>
