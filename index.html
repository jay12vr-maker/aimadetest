<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 
    DEVELOPMENT GUARDRAILS:
    1. NEVER CHANGE CODE WITHOUT EXPLICIT REQUEST.
    2. DO NOT OPTIMIZE CODE. KEEP LOGIC AS PROVIDED.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Vids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase CDN Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-dark: #0f0f0f;
            --yt-border: #3f3f3f;
        }

        body {
            background-color: var(--yt-dark);
            color: white;
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--yt-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #717171;
            border-radius: 10px;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--yt-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--yt-border);
        }

        .logo-text {
            color: white;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background-color: var(--yt-red);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .thumbnail {
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 12px;
            background-color: #272727;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        .publish-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            margin: 80px auto;
            border: 1px solid var(--yt-border);
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }

        .close-modal:hover {
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-overlay">
        <div class="login-card shadow-2xl">
            <div class="flex justify-center mb-6">
                <div class="logo-text">
                    <span class="logo-icon"><i class="fab fa-youtube"></i></span>
                    <span>Secret Vids</span>
                </div>
            </div>
            <h2 class="text-xl mb-4">Sign in to watch</h2>
            <p class="text-gray-400 text-sm mb-8">Access restricted to authorized viewers.</p>
            
            <div class="space-y-4">
                <input type="text" placeholder="Username" id="userIn" class="w-full bg-black border border-zinc-700 p-3 rounded focus:outline-none focus:border-blue-500">
                <input type="password" placeholder="Password" id="passIn" class="w-full bg-black border border-zinc-700 p-3 rounded focus:outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition duration-200">
                    Log In
                </button>
            </div>
        </div>
    </div>

    <!-- Main Navigation Bar -->
    <nav class="fixed top-0 w-full bg-[#0f0f0f] z-50 px-4 h-14 flex items-center justify-between border-b border-zinc-800">
        <div class="flex items-center gap-4">
            <button class="text-xl p-2 hover:bg-zinc-800 rounded-full"><i class="fas fa-bars"></i></button>
            <div class="logo-text cursor-pointer" onclick="location.reload()">
                <span class="logo-icon"><i class="fab fa-youtube"></i></span>
                <span class="hidden sm:inline">Secret Vids</span>
            </div>
        </div>

        <div class="hidden md:flex items-center w-1/2 max-w-[600px]">
            <input type="text" placeholder="Search global feed..." class="w-full bg-[#121212] border border-zinc-700 rounded-l-full py-1.5 px-5 outline-none focus:border-blue-500">
            <button class="bg-zinc-800 border border-zinc-700 border-l-0 rounded-r-full px-5 py-1.5 text-zinc-400 hover:bg-zinc-700"><i class="fas fa-search"></i></button>
        </div>

        <div class="flex items-center gap-2">
            <!-- Publish Button - Only visible to jay12vr -->
            <button id="publishBtn" onclick="openPublishModal()" class="hidden p-2 hover:bg-zinc-800 rounded-full text-blue-500 flex items-center gap-2 px-3">
                <i class="fas fa-plus-circle"></i> <span class="text-sm font-bold">Publish</span>
            </button>
            <button onclick="handleLogout()" class="text-sm border border-zinc-700 px-3 py-1.5 rounded-full hover:bg-zinc-800">Logout</button>
        </div>
    </nav>

    <div class="flex pt-14 h-screen">
        <!-- Sidebar -->
        <aside class="hidden lg:block w-64 bg-[#0f0f0f] p-3 border-r border-zinc-800">
            <div class="space-y-1">
                <div class="bg-zinc-800 flex items-center gap-5 p-3 rounded-lg font-bold">
                    <i class="fas fa-globe text-xl w-6"></i> <span>Global Feed</span>
                </div>
                <div class="hover:bg-zinc-800 flex items-center gap-5 p-3 rounded-lg cursor-pointer">
                    <i class="fas fa-fire text-xl w-6"></i> <span>Trending</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-[#0f0f0f] p-6 overflow-y-auto">
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-10">
                <!-- Videos injected by Supabase script -->
            </div>
        </main>
    </div>

    <!-- Video Player Modal -->
    <div id="videoPlayerModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('videoPlayerModal')">&times;</span>
            <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl">
                <iframe id="mainVideoPlayer" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="mt-4">
                <h2 id="modalVideoTitle" class="text-2xl font-bold"></h2>
                <div class="flex items-center gap-4 mt-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-user-secret"></i>
                    </div>
                    <div>
                        <p class="font-bold" id="modalAuthor">Secret Author</p>
                        <p class="text-xs text-zinc-400">Global Broadcast</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Publish Video Modal -->
    <div id="publishModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('publishModal')">&times;</span>
            <div class="publish-card">
                <h2 class="text-2xl font-bold mb-6 text-center">Global Publication</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">YouTube Video ID</label>
                        <input type="text" id="pubVidId" class="w-full bg-black border border-zinc-700 p-3 rounded focus:outline-none focus:border-blue-500" placeholder="e.g. dQw4w9WgXcQ">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Video Title</label>
                        <input type="text" id="pubTitle" class="w-full bg-black border border-zinc-700 p-3 rounded focus:outline-none focus:border-blue-500" placeholder="Title...">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Thumbnail (data:image/ URL)</label>
                        <textarea id="pubThumb" rows="3" class="w-full bg-black border border-zinc-700 p-3 rounded text-xs focus:outline-none focus:border-blue-500" placeholder="data:image/png;base64,..."></textarea>
                    </div>
                    <button onclick="handlePublish()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition duration-200 mt-4">
                        Publish to Global Database
                    </button>
                    <p class="text-[10px] text-zinc-500 text-center uppercase tracking-widest">Connected to live backend</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * SUPABASE INITIALIZATION
         * Replace these with your actual credentials from Supabase Project Settings > API
         */
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function handleLogin() {
            const user = document.getElementById('userIn').value;
            const pass = document.getElementById('passIn').value;

            if (user === 'jay12vr' && pass === '12321') {
                sessionStorage.setItem('isLogged', 'true');
                sessionStorage.setItem('user', user);
                document.getElementById('loginScreen').classList.add('hidden');
                checkAdmin();
                render();
            } else if (user && pass) {
                sessionStorage.setItem('isLogged', 'true');
                sessionStorage.setItem('user', user);
                document.getElementById('loginScreen').classList.add('hidden');
                checkAdmin();
                render();
            } else {
                alert("Login Required");
            }
        }

        function handleLogout() {
            sessionStorage.clear();
            location.reload();
        }

        function checkAdmin() {
            const user = sessionStorage.getItem('user');
            if (user === 'jay12vr') {
                document.getElementById('publishBtn').classList.remove('hidden');
            }
        }

        function openPublishModal() {
            document.getElementById('publishModal').style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if(id === 'videoPlayerModal') document.getElementById('mainVideoPlayer').src = '';
        }

        // ASYNC PUBLISH TO DATABASE
        async function handlePublish() {
            const yid = document.getElementById('pubVidId').value;
            const title = document.getElementById('pubTitle').value;
            const thumb = document.getElementById('pubThumb').value.trim();

            if (!yid || !title) return alert("Missing Info");
            if (!thumb.startsWith('data:image/')) return alert("Must use data:image/ URL");

            const { data, error } = await supabase
                .from('videos')
                .insert([
                    { 
                        youtubeId: yid, 
                        title: title, 
                        author: sessionStorage.getItem('user'), 
                        thumb: thumb 
                    }
                ]);

            if (error) {
                alert("Database error: " + error.message);
            } else {
                closeModal('publishModal');
                render();
            }
        }

        // ASYNC FETCH FROM DATABASE
        async function render() {
            const grid = document.getElementById('videoGrid');
            
            const { data: videos, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching vids:", error);
                return;
            }

            if (videos.length === 0) {
                grid.innerHTML = '<p class="text-zinc-500 col-span-full text-center">Global feed is currently empty.</p>';
                return;
            }

            grid.innerHTML = videos.map(v => `
                <div class="cursor-pointer group" onclick="play('${v.youtubeId}', '${v.title}', '${v.author}')">
                    <div class="relative mb-3">
                        <img src="${v.thumb}" class="thumbnail w-full border border-zinc-800" alt="thumb">
                    </div>
                    <div class="flex gap-3">
                        <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center text-xs uppercase">${v.author[0]}</div>
                        <div>
                            <h3 class="font-bold text-sm leading-snug group-hover:text-blue-400">${v.title}</h3>
                            <p class="text-zinc-500 text-xs mt-1">${v.author} • Global</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function play(id, title, author) {
            document.getElementById('mainVideoPlayer').src = `https://www.youtube.com{id}?autoplay=1`;
            document.getElementById('modalVideoTitle').innerText = title;
            document.getElementById('modalAuthor').innerText = author;
            document.getElementById('videoPlayerModal').style.display = 'block';
        }

        window.onload = () => {
            if (sessionStorage.getItem('isLogged')) {
                document.getElementById('loginScreen').classList.add('hidden');
                checkAdmin();
                render();
            }
        }
    </script>
</body>
</html>
